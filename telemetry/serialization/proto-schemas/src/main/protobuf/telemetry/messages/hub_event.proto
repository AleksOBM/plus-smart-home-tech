syntax = "proto3";

package telemetry.message.event;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.grpc.telemetry.event";

/** Любое событие хаба. */
message HubEventProto {
  string hub_id = 1; // Идентификатор хаба, связанного с событием.
  google.protobuf.Timestamp timestamp = 2; // Временная метка события.
  oneof payload { // Событие хаба.
    DeviceAddedEventProto device_added_event = 3;         // добавление устройства
    DeviceRemovedEventProto device_removed_event = 4;     // удаление устройства
    ScenarioAddedEventProto scenario_added_event = 5;     // добавление нового сценария
    ScenarioRemovedEventProto scenario_removed_event = 6; // удаления сценария
  }
}

/**
  * Условие сценария, которое содержит
  * информацию о датчике, типе условия,
  * операции и значении.
  */
message ScenarioConditionProto {
  string sensor_id = 1; // Идентификатор датчика, связанного с условием.
  ConditionTypeProto type = 2; // Тип условия сценария.
  ConditionOperationProto operation = 3; // Используемая в условии операция.
  oneof value { // Значение, используемое в условии.
    bool bool_value = 4;
    int32 int_value = 5;
  }
}

/**
  * Представляет действие, которое
  * должно быть выполнено устройством.
  */
message DeviceActionProto {
  string sensor_id = 1; // Идентификатор датчика, связанного с действием.
  ActionTypeProto type = 2; // Действие при срабатывании условия активации сценария.
  optional int32 value = 4; // Необязательное значение, связанное с действием.
}

/**
  * Событие, сигнализирующее о
  * добавлении нового устройства
  * в систему.
  */
message DeviceAddedEventProto {
  string id = 1; // Идентификатор устройства.
  DeviceTypeProto device_type = 2; // Тип устройства.
}

/**
  * Событие, сигнализирующее о
  * удалении устройства из системы.
  */
message DeviceRemovedEventProto {
  string id = 1; // Идентификатор устройства.
  DeviceTypeProto device_type = 2; // Тип устройства.
}

/**
  * Событие добавления сценария в систему.
  * Содержит информацию о названии сценария,
  * условиях и действиях.
  */
message ScenarioAddedEventProto {

  /**
    * Название добавленного сценария.
    * Должно содержать не менее 3 символов.
    */
  string name = 1;

  /**
    * Список условий, которые связаны
    * со сценарием. Не может быть пустым.
    */
  repeated ScenarioConditionProto conditions = 2;

  /**
    * Список действий, которые должны
    * быть выполнены в рамках сценария.
    * Не может быть пустым.
  */
  repeated DeviceActionProto actions = 3;
}

/**
  * Событие удаления сценария из системы.
  * Содержит информацию о названии
  * удаленного сценария.
  */
message ScenarioRemovedEventProto {

  /**
    * Название удаленного сценария.
    * Должно содержать не менее 3 символов.
    */
  string name = 1;
}

/**
  * Перечисление типов устройств,
  * которые могут быть добавлены в систему.
  */
enum DeviceTypeProto {
  MOTION_SENSOR = 0;
  TEMPERATURE_SENSOR = 1;
  LIGHT_SENSOR = 2;
  CLIMATE_SENSOR = 3;
  SWITCH_SENSOR = 4;
}

/**
  * Типы условий, которые могут
  * использоваться в сценариях.
  */
enum ConditionTypeProto {
  MOTION = 0;
  LUMINOSITY = 1;
  SWITCH = 2;
  TEMPERATURE = 3;
  CO2LEVEL = 4;
  HUMIDITY = 5;
}

/**
  * Операции, которые могут быть
  * использованы в условиях.
  */
enum ConditionOperationProto {
  EQUALS = 0;
  GREATER_THAN = 1;
  LOWER_THAN = 2;
}

/**
  * Перечисление возможных типов
  * действий при срабатывании условия
  * активации сценария.
  */
enum ActionTypeProto {
  ACTIVATE = 0;
  DEACTIVATE = 1;
  INVERSE = 2;
  SET_VALUE = 3;
}
